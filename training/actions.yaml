# ============================================================================
# training/actions.yaml
# YOLO classification dataset config for per-fighter-crop action recognition.
# Each crop is a fighter bounding box extracted from a frame.
#
# Mirrors ACTION_CLASSES in vision/events.py.
# ============================================================================

path: ./data/actions             # dataset root
train: train
val:   val
test:  test                      # optional

# Number of classes
nc: 26

# Class index → name (mirrors ACTION_CLASSES in vision/events.py)
names:
  0:  standing
  1:  jab_throwing
  2:  cross_throwing
  3:  hook_throwing
  4:  uppercut_throwing
  5:  kick_throwing
  6:  elbow_throwing
  7:  knee_throwing
  8:  ground_strike
  9:  clinch
  10: takedown_attempt
  11: takedown_defense
  12: half_guard_top
  13: half_guard_bottom
  14: full_guard_top
  15: full_guard_bottom
  16: side_control_top
  17: side_control_bottom
  18: back_control_top
  19: back_control_bottom
  20: submission_attempt
  21: cage_grappling
  22: sweep
  23: reversal
  24: knockdown
  25: ko

# ============================================================================
# Recommended training command
# Fine-tune YOLOv8 classification on fighter crops (80×80 or 224×224)
# ============================================================================
# yolo classify train \
#   model=yolov8m-cls.pt \
#   data=training/actions.yaml \
#   epochs=80 \
#   imgsz=224 \
#   batch=32 \
#   device=0 \
#   project=runs/actions \
#   name=v1
